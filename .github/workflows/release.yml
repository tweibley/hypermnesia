# Cut a release + refresh the Homebrew cask on every `v*` tag.
#
# One-time setup — add these repo secrets (Settings → Secrets and variables → Actions):
#   MACOS_CERT_P12_BASE64     base64 of your "Developer ID Application" cert exported as .p12
#                             (`base64 -i cert.p12 | pbcopy`)
#   MACOS_CERT_PASSWORD       the password you set when exporting that .p12
#   MACOS_NOTARY_KEY_BASE64   base64 of your App Store Connect API key (AuthKey_XXXX.p8)
#   MACOS_NOTARY_KEY_ID       the key's Key ID
#   MACOS_NOTARY_ISSUER_ID    the Issuer ID from App Store Connect → Integrations
#   HOMEBREW_TAP_TOKEN        a PAT with `contents:write` on tweibley/homebrew-tap
#                             (only needed for the auto-update-tap job)
#
# Then: `git tag v0.1.0 && git push origin v0.1.0`.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.pkg.outputs.version }}
      sha256: ${{ steps.pkg.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v7

      # Same toolchain pin as ci.yml (Swift 6.2 series) — macos-14's default Xcode is Swift 5.10,
      # which can't even parse the Package.swift (tools-version 6.0), and newest-overall picks the
      # Swift 6.3.3 toolchain whose test runner is known-bad for this project.
      - name: Select Xcode (pin to 26.1.x — the Swift 6.2 series)
        run: |
          XCODE=$(ls -d /Applications/Xcode_26.1*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1); fi
          echo "Selected: $XCODE"
          sudo xcode-select -s "$XCODE"

      - name: Validate tag matches VERSION
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match VERSION file ($FILE_VERSION)." >&2
            exit 1
          fi

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PWD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')

      - name: Store notarytool credentials
        env:
          NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          echo "$NOTARY_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          xcrun notarytool store-credentials hypermnesia-notary \
            --key "$RUNNER_TEMP/AuthKey.p8" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID"

      - name: Build, sign, notarize, package
        id: pkg
        env:
          NOTARY_PROFILE: hypermnesia-notary
          UNIVERSAL: "1"
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash Scripts/release.sh
          SHA="$(shasum -a 256 "dist/Hypermnesia-$VERSION.zip" | awk '{print $1}')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/Hypermnesia-${{ steps.pkg.outputs.version }}.zip
          generate_release_notes: true

  update-tap:
    needs: build
    runs-on: ubuntu-latest
    # Runs only once you've created the tap repo + HOMEBREW_TAP_TOKEN and set the repo
    # variable ENABLE_TAP_UPDATE=true (Settings → Secrets and variables → Actions → Variables).
    # Until then the release still publishes; you bump the cask by hand the first time.
    if: vars.ENABLE_TAP_UPDATE == 'true'
    steps:
      - name: Checkout tap
        uses: actions/checkout@v7
        with:
          repository: tweibley/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Bump cask version + sha256
        env:
          VERSION: ${{ needs.build.outputs.version }}
          SHA256: ${{ needs.build.outputs.sha256 }}
        run: |
          CASK="Casks/hypermnesia.rb"
          sed -i -E "s/^  version \".*\"/  version \"$VERSION\"/" "$CASK"
          sed -i -E "s/^  sha256 \".*\"/  sha256 \"$SHA256\"/" "$CASK"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- "$CASK"; then
            echo "No tap changes to commit."
            exit 0
          fi
          git commit -am "hypermnesia $VERSION"
          git push
