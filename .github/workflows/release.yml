# Cut a release on every `v*` tag.
#
# One-time setup — add these repo secrets (Settings → Secrets and variables → Actions):
#   MACOS_CERT_P12_BASE64     base64 of your "Developer ID Application" cert exported as .p12
#                             (`base64 -i cert.p12 | pbcopy`)
#   MACOS_CERT_PASSWORD       the password you set when exporting that .p12
#   MACOS_NOTARY_KEY_BASE64   base64 of your App Store Connect API key (AuthKey_XXXX.p8)
#   MACOS_NOTARY_KEY_ID       the key's Key ID
#   MACOS_NOTARY_ISSUER_ID    the Issuer ID from App Store Connect → Integrations
#   SPARKLE_ED_PRIVATE_KEY    the EdDSA private key for Sparkle update signing — export with
#                             `generate_keys -x key.txt` (Sparkle's tool), `gh secret set
#                             SPARKLE_ED_PRIVATE_KEY < key.txt`, then delete key.txt. The
#                             matching public key is committed at packaging/sparkle-public-ed-key.txt.
#
# Then: `git tag v0.1.0 && git push origin v0.1.0`.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      # Same toolchain pin as ci.yml (Swift 6.2 series) — macos-14's default Xcode is Swift 5.10,
      # which can't even parse the Package.swift (tools-version 6.0), and newest-overall picks the
      # Swift 6.3.3 toolchain whose test runner is known-bad for this project.
      - name: Select Xcode (pin to 26.1.x — the Swift 6.2 series)
        run: |
          XCODE=$(ls -d /Applications/Xcode_26.1*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1); fi
          echo "Selected: $XCODE"
          sudo xcode-select -s "$XCODE"

      - name: Validate tag matches VERSION
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match VERSION file ($FILE_VERSION)." >&2
            exit 1
          fi

      - name: Verify checkout is exact tagged SHA
        run: |
          HEAD_SHA="$(git rev-parse HEAD)"
          TAG_SHA="$(git rev-parse "${GITHUB_REF_NAME}^{commit}")"
          if [ "$HEAD_SHA" != "$TAG_SHA" ] || [ "$HEAD_SHA" != "$GITHUB_SHA" ]; then
            echo "Release checkout mismatch: HEAD=$HEAD_SHA tag=$TAG_SHA event=$GITHUB_SHA" >&2
            exit 1
          fi

      # Deterministic release contract gate. The broader eval harness is model-driven; its
      # --skip-claude mode still provisions external Python grader environments and validates
      # harness mechanics rather than the signed Swift product. Keep signing gated on the complete,
      # no-model Swift contract suite (which covers hook commands, queue health, storage, and CLI).
      - name: Swift contract suite
        timeout-minutes: 10
        run: swift test --parallel

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PWD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')

      - name: Store notarytool credentials
        env:
          NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          echo "$NOTARY_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          xcrun notarytool store-credentials hypermnesia-notary \
            --key "$RUNNER_TEMP/AuthKey.p8" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID"

      - name: Build, sign, notarize, package
        id: pkg
        env:
          NOTARY_PROFILE: hypermnesia-notary
          UNIVERSAL: "1"
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash Scripts/release.sh
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          # Pull this version's CHANGELOG section (header line excluded) so the GitHub release body —
          # and the Sparkle "release notes" link that points at releases/tag/v$VERSION — show the
          # curated notes instead of an empty auto-generated body. generate_release_notes below then
          # appends the "Full Changelog" compare link.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { f=1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md > dist/release-notes.md
          if [ ! -s dist/release-notes.md ]; then
            echo "See [CHANGELOG.md](https://github.com/tweibley/hypermnesia/blob/main/CHANGELOG.md)." > dist/release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # The version-less alias gives the site a stable direct-download URL:
          # https://github.com/tweibley/hypermnesia/releases/latest/download/Hypermnesia.zip
          # appcast.xml rides along so releases/latest/download/appcast.xml is the Sparkle feed.
          files: |
            dist/Hypermnesia-${{ steps.pkg.outputs.version }}.zip
            dist/Hypermnesia.zip
            dist/appcast.xml
          # Fail the release rather than publish silently missing a listed asset (e.g. a dropped
          # appcast.xml would 404 every installed user's Sparkle update check).
          fail_on_unmatched_files: true
          # The release body is this version's curated CHANGELOG section (the Sparkle "release notes"
          # link points here); generate_release_notes appends the auto "Full Changelog" compare link.
          body_path: dist/release-notes.md
          generate_release_notes: true
